<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS Store</title>
    <script src="https://telegram.org"></script>
    <script src="https://cloudpayments.ru"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; color: #333; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .price { color: #007bff; font-size: 20px; font-weight: bold; }
        button { background: #0088cc; color: white; border: none; border-radius: 10px; padding: 10px 20px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>🎮 Магазин GSS</h2>
    
    <div class="card">
        <div class="title">PlayStation Turkey (TL) 🇹🇷</div>
        <select id="nominal_tr">
            <option value="1500" data-val="250">250 TL — 1500₽</option>
            <option value="6000" data-val="1000">1000 TL — 6000₽</option>
        </select>
        <button onclick="pay('tr')">Купить коды</button>
    </div>

    <div class="card">
        <div class="title">PlayStation India (INR) 🇮🇳</div>
        <select id="nominal_in">
            <option value="1500" data-val="1000">1000 INR — 1500₽</option>
            <option value="7500" data-val="5000">5000 INR — 7500₽</option>
        </select>
        <button onclick="pay('in')">Купить коды</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function pay(region) {
            let select = document.getElementById('nominal_' + region);
            let amount = select.value;
            let label = select.options[select.selectedIndex].text;
            let nominalValue = select.options[select.selectedIndex].getAttribute('data-val');

            var widget = new cp.CloudPayments();
            widget.pay('auth', // или 'charge'
                { 
                    publicId: 'pk_58452a4fdeaf4305db7c779244bae', // Твой ID
                    description: 'Оплата ' + label,
                    amount: parseFloat(amount),
                    currency: 'RUB',
                    accountId: tg.initDataUnsafe.user.id, // ID пользователя в TG
                    invoiceId: region + '_' + nominalValue, // Например: tr_250
                    data: {
                        user_id: tg.initDataUnsafe.user.id,
                        user_name: tg.initDataUnsafe.user.username
                    }
                ,
                {
                    onSuccess: function (options) { 
                        tg.showAlert("✅ Оплата прошла успешно! Вернитесь в бота за кодами.");
                        tg.close();
                    },
                    onFail: function (reason, options) { 
                        tg.showAlert("❌ Ошибка оплаты: " + reason);
                    }
                }
            );
        }
    </script>
</body>
</html>
